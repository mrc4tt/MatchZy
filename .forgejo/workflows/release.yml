name: Build and Release
on:
  push:
    paths-ignore:
      - documentation/**
      - '**/*.md'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    # Auth for the "forgejo" NuGet source (CS2MenuManager) in nuget.config.
    env:
      NuGetPackageSourceCredentials_forgejo: "Username=${{ secrets.FORGEJO_USER || 'mikkel' }};Password=${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y p7zip-full jq curl wget

      - name: Get MatchZy Version
        id: matchzy_version
        run: |
          VERSION=$(grep -oP 'ModuleVersion\s*=>\s*"\K[^"]*' Core/MatchZy.cs)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from Core/MatchZy.cs"
            exit 1
          fi
          echo "MATCHZY_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://git.miksen.me/api/v1/repos/${{ github.repository }}/releases/tags/${{ env.MATCHZY_VERSION }}")
          if [ "$STATUS" = "200" ]; then
            echo "Release ${{ env.MATCHZY_VERSION }} already exists. Skipping."
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "New version detected: ${{ env.MATCHZY_VERSION }}"
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up .NET
        if: steps.check_release.outputs.SKIP == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Build and Release Artifacts
        if: steps.check_release.outputs.SKIP == 'false'
        run: |
          set -e

          CSSHARP_VERSION=$(grep -Po '<PackageReference Include="CounterStrikeSharp.API" Version="\K\d+(\.\d+)*' MatchZy.csproj)
          if [ -z "$CSSHARP_VERSION" ]; then
            echo "Error: Could not extract CounterStrikeSharp version from MatchZy.csproj"
            exit 1
          fi
          echo "CounterStrikeSharp version: $CSSHARP_VERSION"

          # Build MatchZy-only package
          dotnet publish -c Release -o package/addons/counterstrikesharp/plugins/MatchZy
          # Ship cfgs under cfg/MatchZy/ so they extract to csgo/cfg/MatchZy/ — the dir the
          # plugin execs (exec matchzy/live.cfg etc). A flat cfg/ landed them in csgo/cfg/.
          mkdir -p package/cfg/MatchZy
          cp cfg/*.cfg package/cfg/MatchZy/
          cd package && 7z a -tzip ../MatchZy-${{ env.MATCHZY_VERSION }}.zip . && cd ..

          # Build with CSSharp Linux runtime
          echo "Downloading Linux Runtime..."
          wget -q "https://github.com/roflmuffin/CounterStrikeSharp/releases/download/v${CSSHARP_VERSION}/counterstrikesharp-with-runtime-linux-${CSSHARP_VERSION}.zip" -O cssharp-linux.zip
          7z x -y -opackage cssharp-linux.zip
          dotnet publish -c Release -o package/addons/counterstrikesharp/plugins/MatchZy
          cd package && 7z a -tzip ../MatchZy-${{ env.MATCHZY_VERSION }}-with-cssharp-linux.zip . && cd ..

          # Build with CSSharp Windows runtime
          rm -rf package/addons/counterstrikesharp
          echo "Downloading Windows Runtime..."
          wget -q "https://github.com/roflmuffin/CounterStrikeSharp/releases/download/v${CSSHARP_VERSION}/counterstrikesharp-with-runtime-windows-${CSSHARP_VERSION}.zip" -O cssharp-windows.zip
          7z x -y -opackage cssharp-windows.zip
          dotnet publish -c Release -o package/addons/counterstrikesharp/plugins/MatchZy
          cd package && 7z a -tzip ../MatchZy-${{ env.MATCHZY_VERSION }}-with-cssharp-windows.zip . && cd ..

      - name: Create Forgejo Release
        if: steps.check_release.outputs.SKIP == 'false'
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Create release
          echo "Creating release ${{ env.MATCHZY_VERSION }}..."
          RELEASE_RESPONSE=$(curl -s -X POST \
            "https://git.miksen.me/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${{ env.MATCHZY_VERSION }}\",
              \"name\": \"MatchZy ${{ env.MATCHZY_VERSION }}\",
              \"body\": \"Auto-generated build from VPS runner.\",
              \"draft\": false,
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Error: Failed to create release!"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi
          echo "Created release with ID: $RELEASE_ID"

          # Upload assets
          for file in MatchZy-${{ env.MATCHZY_VERSION }}*.zip; do
            echo "Uploading $file..."
            UPLOAD_RESPONSE=$(curl -s -X POST \
              "https://git.miksen.me/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$file" \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file")

            ASSET_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.id // empty')
            if [ -z "$ASSET_ID" ]; then
              echo "Warning: Upload may have failed for $file"
              echo "$UPLOAD_RESPONSE"
            else
              echo "Uploaded $file (asset ID: $ASSET_ID)"
            fi
          done
