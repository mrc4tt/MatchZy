name: Build and Release
on:
  push:
    paths-ignore:
      - documentation/**
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt update && apt install -y sudo
          sudo apt-get update
          sudo apt-get install -y zip jq curl wget

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Get MatchZy Version
        id: matchzy_version_step
        run: |
          VERSION=$(grep -oP 'ModuleVersion\s*=>\s*"\K[^"]*' MatchZy.cs)
          echo "MATCHZY_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and Release Artifacts
        run: |
          MATCHZY_VERSION=$(grep -oP 'ModuleVersion\s*=>\s*"\K[^"]*' MatchZy.cs)
          CSSHARP_VERSION=$(grep -Po '<PackageReference Include="CounterStrikeSharp.API" Version="\K\d+(\.\d+)*' MatchZy.csproj)

          dotnet publish -c Release -o package/addons/counterstrikesharp/plugins/MatchZy
          cp -r cfg package/
          cd package && zip -q -r ../MatchZy-$MATCHZY_VERSION.zip * && cd ..

          echo "Downloader Linux Runtime..."
          wget -q "https://github.com/roflmuffin/CounterStrikeSharp/releases/download/v${CSSHARP_VERSION}/counterstrikesharp-with-runtime-linux-${CSSHARP_VERSION}.zip" -O cssharp-linux.zip
          unzip -o cssharp-linux.zip -d package/
          dotnet publish -c Release -o package/addons/counterstrikesharp/plugins/MatchZy
          cd package && zip -q -r ../MatchZy-$MATCHZY_VERSION-with-cssharp-linux.zip * && cd ..
          
          rm -rf package/addons/counterstrikesharp
          echo "Downloader Windows Runtime..."
          wget -q "https://github.com/roflmuffin/CounterStrikeSharp/releases/download/v${CSSHARP_VERSION}/counterstrikesharp-with-runtime-windows-${CSSHARP_VERSION}.zip" -O cssharp-windows.zip
          unzip -o cssharp-windows.zip -d package/
          dotnet publish -c Release -o package/addons/counterstrikesharp/plugins/MatchZy
          cd package && zip -q -r ../MatchZy-$MATCHZY_VERSION-with-cssharp-windows.zip * && cd ..

      - name: Create Forgejo Release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Opret releasen
          curl -X POST "https://git.miksen.me/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${{ env.MATCHZY_VERSION }}\",
              \"name\": \"MatchZy ${{ env.MATCHZY_VERSION }}\",
              \"body\": \"Autogenereret build fra VPS runner.\",
              \"draft\": false,
              \"prerelease\": false
            }" > release_response.json

          # 2. Find ID
          RELEASE_ID=$(grep -oP '"id":\s*\K\d+' release_response.json | head -n 1)
          echo "Release created with ID: $RELEASE_ID"

          # 3. Upload med name-parameter
          for file in MatchZy-${{ env.MATCHZY_VERSION }}*.zip; do
            echo "Uploading $file..."
            curl -X POST "https://git.miksen.me/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$file" \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              -F "attachment=@$file"
          done
