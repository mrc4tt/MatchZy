name: Build and Release
on:
  push:
    paths-ignore:
      - documentation/**
      - '**/*.md'
    branches:
      - main
  workflow_dispatch:

# Needed by softprops/action-gh-release to create the GitHub release.
permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      # Auth for the "forgejo" NuGet source (CS2MenuManager) in nuget.config. On the GitHub
      # mirror, add repo secrets FORGEJO_USER + RELEASE_TOKEN so `dotnet restore` can reach the
      # feed at git.miksen.me (GITHUB_TOKEN there cannot authenticate to the Forgejo instance).
      NuGetPackageSourceCredentials_forgejo: "Username=${{ secrets.FORGEJO_USER || 'mikkel' }};Password=${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y p7zip-full jq curl wget

      - name: Get MatchZy Version
        id: matchzy_version
        run: |
          VERSION=$(grep -oP 'ModuleVersion\s*=>\s*"\K[^"]*' Core/MatchZy.cs)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from Core/MatchZy.cs"
            exit 1
          fi
          echo "MATCHZY_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Build MatchZy package
        run: |
          set -e
          # Plugin only. The CounterStrikeSharp runtime bundles (with-cssharp-linux/windows zips)
          # are no longer shipped - install CounterStrikeSharp separately on the server.
          dotnet publish -c Release -o package/addons/counterstrikesharp/plugins/MatchZy
          # Ship cfgs under cfg/MatchZy/ so they extract to csgo/cfg/MatchZy/ - the dir the plugin
          # execs (exec matchzy/live.cfg etc).
          mkdir -p package/cfg/MatchZy
          cp cfg/*.cfg package/cfg/MatchZy/
          # Ship MatchZy's gamedata so CounterStrikeSharp auto-loads it (it merges every *.json in
          # the gamedata dir). Provides the signatures MatchZy resolves by key - practice grenade
          # rethrow (.rt/.last/.back) and .breakrestore - so it works on stock CSS without editing
          # the core gamedata.json.
          mkdir -p package/addons/counterstrikesharp/gamedata
          cp gamedata/matchzy.json package/addons/counterstrikesharp/gamedata/matchzy.json
          cd package && 7z a -tzip ../MatchZy-${{ env.MATCHZY_VERSION }}.zip . && cd ..

      - name: Extract release notes
        run: |
          # Top version block of CHANGELOG.md becomes the release body.
          awk '/^# [0-9]/{n++} n==1' CHANGELOG.md > notes.md || true
          [ -s notes.md ] || echo "Automated build." > notes.md

      # --- GitHub release (runs on the github.com mirror) ---
      # Uses the gh CLI (a run: step) rather than a marketplace action: the Forgejo runner tries
      # to clone every `uses:` action at prep time - before the `if` is evaluated - and
      # softprops/action-gh-release is not mirrored to data.forgejo.org, which failed the whole
      # job. A run: step is simply skipped by the `if` with nothing to fetch. gh is preinstalled
      # on GitHub-hosted runners.
      - name: Create GitHub Release
        if: github.server_url == 'https://github.com'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VER="${{ env.MATCHZY_VERSION }}"
          ASSET="MatchZy-${VER}.zip"
          if gh release view "$VER" >/dev/null 2>&1; then
            gh release upload "$VER" "$ASSET" --clobber
          else
            gh release create "$VER" "$ASSET" --title "MatchZy $VER" --notes-file notes.md
          fi

      # --- Forgejo release (runs on the Forgejo instance) ---
      # Create the release if missing, otherwise UPDATE it in place: delete the old same-name
      # asset and re-upload. This lets a same-version fix (no ModuleVersion bump) refresh the zip
      # on an existing release instead of being skipped (mirrors the GitHub --clobber behavior).
      - name: Create or update Forgejo Release
        if: github.server_url != 'https://github.com'
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          API="${{ github.server_url }}/api/v1/repos/${{ github.repository }}"
          VER="${{ env.MATCHZY_VERSION }}"
          BODY=$(jq -Rs . < notes.md)

          REL=$(curl -s -H "Authorization: token $GITEA_TOKEN" "$API/releases/tags/$VER")
          RELEASE_ID=$(echo "$REL" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "Creating release $VER..."
            REL=$(curl -s -X POST "$API/releases" \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$VER\",\"name\":\"MatchZy $VER\",\"body\":$BODY,\"draft\":false,\"prerelease\":false}")
            RELEASE_ID=$(echo "$REL" | jq -r '.id // empty')
            if [ -z "$RELEASE_ID" ]; then
              echo "Error: Failed to create release!"
              echo "$REL"
              exit 1
            fi
            echo "Created release with ID: $RELEASE_ID"
          else
            echo "Release $VER already exists (ID: $RELEASE_ID); updating its assets."
          fi

          for file in MatchZy-${VER}*.zip; do
            # Replace an existing same-name asset so the zip is refreshed, not duplicated.
            EXIST_ID=$(echo "$REL" | jq -r --arg n "$file" '.assets[]? | select(.name==$n) | .id')
            if [ -n "$EXIST_ID" ]; then
              echo "Deleting old asset $file (ID: $EXIST_ID)"
              curl -s -X DELETE "$API/releases/$RELEASE_ID/assets/$EXIST_ID" -H "Authorization: token $GITEA_TOKEN" >/dev/null
            fi
            echo "Uploading $file..."
            UPLOAD_RESPONSE=$(curl -s -X POST \
              "$API/releases/$RELEASE_ID/assets?name=$file" \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file")
            ASSET_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.id // empty')
            if [ -z "$ASSET_ID" ]; then
              echo "Warning: Upload may have failed for $file"
              echo "$UPLOAD_RESPONSE"
            else
              echo "Uploaded $file (asset ID: $ASSET_ID)"
            fi
          done
